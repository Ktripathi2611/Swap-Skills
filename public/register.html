<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Skill Swap</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/theme.js"></script>
</head>

<body>
    <div class="auth-page">
        <div class="glass-card auth-card" style="animation:scaleIn 0.5s ease forwards;">
            <h1>Create Account</h1>
            <p class="auth-subtitle">Join the skill exchange community</p>
            <form id="registerForm">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="johndoe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" class="form-control" placeholder="Re-enter password"
                        required>
                </div>
                <button type="submit" class="btn btn-primary w-full btn-lg">Create Account</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="/login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/navbar.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const full_name = document.getElementById('full_name').value.trim();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (!validateForm({ 'Full Name': full_name, Username: username, Email: email, Password: password })) return;
            if (!validateEmail(email)) return showToast('Invalid email format', 'error');
            if (password.length < 6) return showToast('Password must be at least 6 characters', 'error');
            if (password !== confirm) return showToast('Passwords do not match', 'error');

            try {
                await api.post('/auth/register', { full_name, username, email, password });
                showToast('Account created!', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 800);
            } catch (err) {
                showToast(err.message, 'error');
            }
        });
    </script>
</body>

</html>
