<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Skill Swap</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/theme.js"></script>
</head>

<body>
    <div class="auth-page">
        <div class="glass-card auth-card" style="animation:scaleIn 0.5s ease forwards;">
            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue swapping skills</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn btn-primary w-full btn-lg">Sign In</button>
            </form>
            <div class="auth-footer">
                Don't have an account? <a href="/register.html">Sign Up</a>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/navbar.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!validateForm({ Email: email, Password: password })) return;

            try {
                await api.post('/auth/login', { email, password });
                showToast('Login successful!', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 800);
            } catch (err) {
                showToast(err.message, 'error');
            }
        });
    </script>
</body>

</html>
