<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessions — Skill Swap</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/theme.js"></script>
</head>

<body>
    <div class="page-content">
        <div class="container" style="padding-top:2rem;padding-bottom:3rem;">
            <div class="page-header d-flex justify-between align-center flex-wrap gap-2">
                <div>
                    <h1>Sessions</h1>
                    <p>Schedule and manage your learning sessions</p>
                </div>
                <button class="btn btn-primary" onclick="openCreateModal()" id="createBtn">+ Schedule Session</button>
            </div>

            <!-- Tabs -->
            <div class="tabs" id="sessionTabs">
                <button class="tab active" onclick="filterSessions('all', this)">All</button>
                <button class="tab" onclick="filterSessions('scheduled', this)">Scheduled</button>
                <button class="tab" onclick="filterSessions('completed', this)">Completed</button>
                <button class="tab" onclick="filterSessions('cancelled', this)">Cancelled</button>
            </div>

            <!-- Sessions List -->
            <div id="sessionsList">
                <div class="skeleton skeleton-card glass-card"></div>
            </div>
        </div>
    </div>

    <!-- Create Session Modal -->
    <div class="modal-overlay" id="sessionModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Schedule Session</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="sessionForm">
                    <div class="form-group">
                        <label>Session Source</label>
                        <select id="sessionSource" class="form-control" required onchange="onSourceChange()">
                            <option value="">Select source...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="sessionTitle" class="form-control" placeholder="e.g. JavaScript Basics"
                            required>
                    </div>
                    <div class="form-group">
                        <label>Date & Time</label>
                        <input type="datetime-local" id="sessionDate" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Duration (minutes)</label>
                        <input type="number" id="sessionDuration" class="form-control" value="60" min="15" max="240">
                    </div>
                    <!-- Meeting link (gated by VIDEO_MEETINGS feature) -->
                    <div class="form-group" id="meetingLinkGroup" style="display:none;">
                        <label>Meeting Link <span style="color:var(--text-muted);font-size:0.8rem;">(Google Meet, Zoom,
                                etc.)</span></label>
                        <input type="url" id="sessionMeetingLink" class="form-control"
                            placeholder="https://meet.google.com/...">
                    </div>
                    <div class="form-group">
                        <label>Notes (optional)</label>
                        <textarea id="sessionNotes" class="form-control" rows="2"
                            placeholder="Topics to cover..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="createSession()">Create</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/navbar.js"></script>
    <script>
        let currentUser = null;
        let allSessions = [];
        let acceptedRequests = [];
        let paidSessions = [];
        let featureFlags = {};
        let currentFilter = 'all';

        async function init() {
            try { featureFlags = await api.get('/features'); } catch (e) { featureFlags = {}; }

            currentUser = await checkAuth();
            if (!currentUser) return;

            // Show meeting link field if feature enabled
            if (featureFlags.VIDEO_MEETINGS) {
                document.getElementById('meetingLinkGroup').style.display = 'block';
            }

            loadSessions();
        }

        async function loadSessions() {
            try {
                allSessions = await api.get('/sessions');
                renderSessions();
            } catch (err) { showToast('Failed to load sessions', 'error'); }
        }

        function renderSessions() {
            const filtered = currentFilter === 'all' ? allSessions : allSessions.filter(s => s.status === currentFilter);
            const div = document.getElementById('sessionsList');

            if (filtered.length === 0) {
                div.innerHTML = `
                    <div class="empty-state glass-card-static">
                        <div class="empty-icon">📅</div>
                        <h3>No sessions</h3>
                        <p>Schedule a session with your partners to start learning</p>
                    </div>`;
                return;
            }

            div.innerHTML = filtered.map(s => {
                const isHost = s.host_id === currentUser.id;
                const partnerName = isHost ? s.participant_name : s.host_name;
                const sessionType = s.session_type || 'swap';

                // Build chat link — prefer existing request chat, fallback to paid chat
                let chatLink = '#';
                if (s.request_id) {
                    chatLink = `/chat.html?requestId=${s.request_id}`;
                } else if (sessionType === 'paid' && s.payment_id) {
                    chatLink = `/chat.html?paymentId=${s.payment_id}`;
                }

                return `
                    <div class="glass-card session-card mb-1 session-clickable" onclick="window.location.href='${chatLink}'" title="Open chat">
                        <div class="d-flex justify-between align-center flex-wrap gap-1">
                            <div>
                                <h3>${s.title}</h3>
                                <span class="badge badge-${sessionType === 'paid' ? 'paid' : 'primary'}" style="margin-right:0.5rem;">${sessionType}</span>
                                <span class="badge badge-${s.status === 'scheduled' ? 'success' : s.status === 'cancelled' ? 'danger' : 'warning'}">${s.status}</span>
                            </div>
                            <div class="d-flex gap-1" onclick="event.stopPropagation()">
                                ${s.status === 'scheduled' && isHost ? `<button class="btn btn-sm btn-success" onclick="completeSession(${s.id})">✅ Complete</button>` : ''}
                                ${s.status === 'scheduled' ? `<button class="btn btn-sm btn-danger" onclick="cancelSession(${s.id})">Cancel</button>` : ''}
                                ${s.status === 'completed' && !isHost ? `<a href="/mentor-profile.html?id=${s.host_id}" class="btn btn-sm btn-secondary">👤 Profile</a><button class="btn btn-sm btn-primary" onclick="window.location.href='/mentor-profile.html?id=${s.host_id}'">⭐ Leave Review</button>` : ''}
                                ${s.status === 'completed' && isHost ? `<a href="/mentor-profile.html?id=${s.host_id}" class="btn btn-sm btn-secondary">📊 My Profile</a>` : ''}
                            </div>
                        </div>
                        <div class="session-details">
                            <div class="session-detail">📅 ${formatDateTime(s.scheduled_at)}</div>
                            <div class="session-detail">⏱ ${s.duration_minutes} min</div>
                            <div class="session-detail">👤 ${partnerName}</div>
                            ${s.meeting_link ? `<a href="${s.meeting_link}" target="_blank" class="btn btn-sm btn-success" onclick="event.stopPropagation()">📹 Join Meeting</a>` : ''}
                        </div>
                        ${s.notes ? `<p style="margin-top:0.5rem;color:var(--text-secondary);font-size:0.9rem;">${s.notes}</p>` : ''}
                        <div class="session-chat-hint">💬 Click to open chat</div>
                    </div>`;
            }).join('');
        }

        function filterSessions(status, tabEl) {
            currentFilter = status;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tabEl.classList.add('active');
            renderSessions();
        }

        async function openCreateModal() {
            // Load accepted requests + paid sessions for the picker
            try {
                const requests = await api.get('/requests');
                acceptedRequests = requests.filter(r => r.status === 'accepted');

                const sourceSelect = document.getElementById('sessionSource');
                let options = '<option value="">Select source...</option>';
                acceptedRequests.forEach(r => {
                    const partnerName = r.sender_id === currentUser.id ? r.receiver_username : r.sender_username;
                    const partnerId = r.sender_id === currentUser.id ? r.receiver_id : r.sender_id;
                    options += `<option value="swap:${r.id}:${partnerId}">🔄 Swap with ${partnerName}</option>`;
                });

                // If paid learning is enabled, show paid sessions too
                if (featureFlags.PAID_LEARNING) {
                    try {
                        const payments = await api.get('/payments/history');
                        const paidOnes = payments.filter(p => p.status === 'paid');
                        paidOnes.forEach(p => {
                            options += `<option value="paid:${p.id}:${p.instructor_id}">💰 Paid: ${p.skill_name} with ${p.instructor_name}</option>`;
                        });

                        const earnings = await api.get('/payments/earnings');
                        earnings.recent.forEach(p => {
                            options += `<option value="paid:${p.id}:${p.payer_id}">💰 Paid: ${p.skill_name} (student: ${p.payer_name})</option>`;
                        });
                    } catch (e) { console.error(e); }
                }

                sourceSelect.innerHTML = options;
            } catch (err) { showToast('Failed to load requests', 'error'); }

            document.getElementById('sessionForm').reset();
            document.getElementById('sessionDuration').value = 60;
            document.getElementById('sessionModal').classList.add('active');
        }

        function onSourceChange() {
            // Auto-fill title based on selected source
            const val = document.getElementById('sessionSource').value;
            if (val) {
                const label = document.getElementById('sessionSource').selectedOptions[0].textContent;
                document.getElementById('sessionTitle').value = label.replace('🔄 ', '').replace('💰 ', '');
            }
        }

        function closeModal() { document.getElementById('sessionModal').classList.remove('active'); }

        async function createSession() {
            const sourceVal = document.getElementById('sessionSource').value;
            if (!sourceVal) return showToast('Please select a session source', 'error');

            const [type, id, partnerId] = sourceVal.split(':');
            const data = {
                participant_id: parseInt(partnerId),
                title: document.getElementById('sessionTitle').value.trim(),
                scheduled_at: document.getElementById('sessionDate').value,
                duration_minutes: parseInt(document.getElementById('sessionDuration').value) || 60,
                notes: document.getElementById('sessionNotes').value.trim() || null
            };

            if (type === 'swap') {
                data.request_id = parseInt(id);
            } else {
                data.payment_id = parseInt(id);
            }

            if (featureFlags.VIDEO_MEETINGS) {
                const link = document.getElementById('sessionMeetingLink').value.trim();
                if (link) data.meeting_link = link;
            }

            if (!data.title || !data.scheduled_at) return showToast('Title and date are required', 'error');

            try {
                await api.post('/sessions', data);
                showToast('Session created!', 'success');
                closeModal();
                loadSessions();
            } catch (err) { showToast(err.message || 'Failed to create session', 'error'); }
        }

        async function completeSession(id) {
            try {
                await api.put(`/sessions/${id}`, { status: 'completed' });
                showToast('Session marked as completed', 'success');
                loadSessions();
            } catch (err) { showToast(err.message, 'error'); }
        }

        async function cancelSession(id) {
            if (!confirm('Cancel this session?')) return;
            try {
                await api.delete(`/sessions/${id}`);
                showToast('Session cancelled', 'success');
                loadSessions();
            } catch (err) { showToast(err.message, 'error'); }
        }

        init();
    </script>
</body>

</html>
