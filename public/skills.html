<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills — Skill Swap</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/theme.js"></script>
</head>

<body>
    <div class="page-content">
        <div class="container" style="padding-top:2rem;padding-bottom:3rem;">
            <div class="page-header d-flex justify-between align-center flex-wrap gap-2">
                <div>
                    <h1>Browse Skills</h1>
                    <p>Discover skills and find your perfect swap partner</p>
                </div>
                <button class="btn btn-primary" onclick="openAddModal()" id="addSkillBtn" style="display:none;">+ Add
                    Skill</button>
            </div>

            <!-- Search & Filter -->
            <div class="search-filter-bar">
                <div class="search-input" style="flex:2;">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search skills..."
                        style="padding-left:2.5rem;">
                </div>
                <select class="form-control" id="categoryFilter" style="max-width:200px;">
                    <option value="">All Categories</option>
                    <option value="Programming">Programming</option>
                    <option value="Design">Design</option>
                    <option value="Music">Music</option>
                    <option value="Languages">Languages</option>
                    <option value="Business">Business</option>
                    <option value="Science">Science</option>
                    <option value="Art">Art</option>
                    <option value="Sports">Sports</option>
                    <option value="Other">Other</option>
                </select>
                <select class="form-control" id="typeFilter" style="max-width:150px;">
                    <option value="">All Types</option>
                    <option value="teach">Teaching</option>
                    <option value="learn">Learning</option>
                </select>
            </div>

            <!-- Skills Grid -->
            <div class="grid grid-3" id="skillsGrid">
                <div class="skeleton skeleton-card glass-card"></div>
                <div class="skeleton skeleton-card glass-card"></div>
                <div class="skeleton skeleton-card glass-card"></div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Skill Modal -->
    <div class="modal-overlay" id="skillModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="skillModalTitle">Add Skill</h3>
                <button class="modal-close" onclick="closeSkillModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="skillForm">
                    <input type="hidden" id="skillId">
                    <div class="form-group">
                        <label>Skill Name</label>
                        <input type="text" id="skillName" class="form-control" placeholder="e.g. JavaScript, Guitar"
                            required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="skillCategory" class="form-control" required>
                            <option value="">Select category</option>
                            <option value="Programming">Programming</option>
                            <option value="Design">Design</option>
                            <option value="Music">Music</option>
                            <option value="Languages">Languages</option>
                            <option value="Business">Business</option>
                            <option value="Science">Science</option>
                            <option value="Art">Art</option>
                            <option value="Sports">Sports</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="skillType" class="form-control" required onchange="togglePriceField()">
                            <option value="teach">I can teach this</option>
                            <option value="learn">I want to learn this</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Proficiency</label>
                        <select id="skillProficiency" class="form-control">
                            <option value="beginner">Beginner</option>
                            <option value="intermediate" selected>Intermediate</option>
                            <option value="advanced">Advanced</option>
                            <option value="expert">Expert</option>
                        </select>
                    </div>
                    <!-- Price field (only for teach skills, gated by PAID_LEARNING) -->
                    <div class="form-group" id="priceGroup" style="display:none;">
                        <label>Price per Session (₹) <span style="color:var(--text-muted);font-size:0.8rem;">— optional,
                                leave empty for swap-only</span></label>
                        <input type="number" id="skillPrice" class="form-control" placeholder="e.g. 500" min="0"
                            step="50">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="skillDescription" class="form-control" rows="3"
                            placeholder="Brief description..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeSkillModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveSkill()">Save</button>
            </div>
        </div>
    </div>

    <!-- Swap Request Modal -->
    <div class="modal-overlay" id="swapModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Send Swap Request</h3>
                <button class="modal-close" onclick="closeSwapModal()">×</button>
            </div>
            <div class="modal-body">
                <p class="mb-2" id="swapInfo"></p>
                <div class="form-group">
                    <label>Your Skill to Offer</label>
                    <select id="swapMySkill" class="form-control"></select>
                </div>
                <div class="form-group">
                    <label>Message (optional)</label>
                    <textarea id="swapMessage" class="form-control" rows="2"
                        placeholder="Hi! I'd love to swap skills..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeSwapModal()">Cancel</button>
                <button class="btn btn-primary" onclick="sendSwap()">Send Request</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/navbar.js"></script>
    <script>
        let currentUser = null;
        let myTeachSkills = [];
        let swapTarget = null;
        let featureFlags = {};

        async function init() {
            // Load feature flags for conditional rendering
            try { featureFlags = await api.get('/features'); } catch (e) { featureFlags = {}; }

            currentUser = await getCurrentUser();
            if (currentUser) {
                document.getElementById('addSkillBtn').style.display = 'inline-flex';
                const mySkills = await api.get(`/skills?user_id=${currentUser.id}`);
                myTeachSkills = mySkills.filter(s => s.type === 'teach');
            }
            togglePriceField();
            loadSkills();

            document.getElementById('searchInput').addEventListener('input', debounce(loadSkills, 400));
            document.getElementById('categoryFilter').addEventListener('change', loadSkills);
            document.getElementById('typeFilter').addEventListener('change', loadSkills);
        }

        function togglePriceField() {
            const type = document.getElementById('skillType').value;
            const priceGroup = document.getElementById('priceGroup');
            if (type === 'teach' && featureFlags.PAID_LEARNING) {
                priceGroup.style.display = 'block';
            } else {
                priceGroup.style.display = 'none';
            }
        }

        async function loadSkills() {
            const search = document.getElementById('searchInput').value.trim();
            const cat = document.getElementById('categoryFilter').value;
            const type = document.getElementById('typeFilter').value;
            let qs = '?';
            if (search) qs += `search=${encodeURIComponent(search)}&`;
            if (cat) qs += `category=${encodeURIComponent(cat)}&`;
            if (type) qs += `type=${encodeURIComponent(type)}&`;

            try {
                const skills = await api.get('/skills' + qs);
                const grid = document.getElementById('skillsGrid');

                if (skills.length === 0) {
                    grid.innerHTML = '<div class="empty-state glass-card-static" style="grid-column:1/-1"><div class="empty-icon">🔍</div><h3>No skills found</h3><p>Try a different search or add a new skill</p></div>';
                    return;
                }

                grid.innerHTML = skills.map(s => {
                    const hasPrice = featureFlags.PAID_LEARNING && s.price_per_session && parseFloat(s.price_per_session) > 0;
                    const priceTag = hasPrice
                        ? `<div class="price-tag">₹${parseFloat(s.price_per_session).toFixed(0)}<span>/session</span></div>`
                        : (s.type === 'teach' ? '<div class="price-tag free">Free (Swap)</div>' : '');

                    // Buttons for other users' teach skills
                    let actionButtons = '';
                    if (currentUser && s.user_id !== currentUser.id && s.type === 'teach') {
                        actionButtons += `<button class="btn btn-sm btn-primary" onclick="openSwapModal(${s.user_id}, ${s.id}, '${s.name.replace(/'/g, "\\'")}', '${s.full_name.replace(/'/g, "\\'")}')">🔄 Swap</button>`;
                        if (hasPrice) {
                            actionButtons += `<button class="btn btn-sm btn-paid" onclick="goToPay(${s.id}, ${s.user_id})">💰 Pay to Learn</button>`;
                        }
                    }
                    // Own skill actions
                    if (currentUser && s.user_id === currentUser.id) {
                        actionButtons = `
                            <button class="btn btn-sm btn-secondary" onclick="editSkill(${s.id})">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteSkill(${s.id})">Delete</button>`;
                    }

                    return `
                        <div class="glass-card skill-card">
                            <div class="skill-card-header">
                                <h3>${s.name}</h3>
                                <span class="badge badge-${s.type}">${s.type}</span>
                            </div>
                            ${priceTag}
                            <div class="skill-meta">
                                <span class="badge badge-primary">${s.category}</span>
                                <span class="badge badge-warning">${s.proficiency}</span>
                            </div>
                            ${s.description ? `<p class="skill-description">${s.description}</p>` : ''}
                            <div class="skill-user">
                                <div class="avatar avatar-sm">${getInitials(s.full_name)}</div>
                                <a href="/profile.html?id=${s.user_id}">${s.full_name}</a>
                            </div>
                            ${actionButtons ? `<div class="d-flex gap-1 mt-1 flex-wrap">${actionButtons}</div>` : ''}
                        </div>`;
                }).join('');
            } catch (err) { showToast('Failed to load skills', 'error'); }
        }

        function goToPay(skillId, instructorId) {
            if (!currentUser) return window.location.href = '/login.html';
            window.location.href = `/payment.html?skillId=${skillId}&instructorId=${instructorId}`;
        }

        function openAddModal() {
            document.getElementById('skillModalTitle').textContent = 'Add Skill';
            document.getElementById('skillForm').reset();
            document.getElementById('skillId').value = '';
            document.getElementById('skillPrice').value = '';
            togglePriceField();
            document.getElementById('skillModal').classList.add('active');
        }

        async function editSkill(id) {
            try {
                const skills = await api.get(`/skills?user_id=${currentUser.id}`);
                const skill = skills.find(s => s.id === id);
                if (!skill) return;
                document.getElementById('skillModalTitle').textContent = 'Edit Skill';
                document.getElementById('skillId').value = skill.id;
                document.getElementById('skillName').value = skill.name;
                document.getElementById('skillCategory').value = skill.category;
                document.getElementById('skillType').value = skill.type;
                document.getElementById('skillProficiency').value = skill.proficiency;
                document.getElementById('skillDescription').value = skill.description || '';
                document.getElementById('skillPrice').value = skill.price_per_session || '';
                togglePriceField();
                document.getElementById('skillModal').classList.add('active');
            } catch (err) { showToast('Error', 'error'); }
        }

        function closeSkillModal() { document.getElementById('skillModal').classList.remove('active'); }

        async function saveSkill() {
            const id = document.getElementById('skillId').value;
            const data = {
                name: document.getElementById('skillName').value.trim(),
                category: document.getElementById('skillCategory').value,
                type: document.getElementById('skillType').value,
                proficiency: document.getElementById('skillProficiency').value,
                description: document.getElementById('skillDescription').value.trim()
            };
            // Include price only for teach skills when paid learning is enabled
            if (data.type === 'teach' && featureFlags.PAID_LEARNING) {
                const priceVal = document.getElementById('skillPrice').value;
                data.price_per_session = priceVal ? parseFloat(priceVal) : null;
            }

            if (!data.name || !data.category) return showToast('Name and category are required', 'error');

            try {
                if (id) { await api.put(`/skills/${id}`, data); showToast('Skill updated!', 'success'); }
                else { await api.post('/skills', data); showToast('Skill added!', 'success'); }
                closeSkillModal();
                const mySkills = await api.get(`/skills?user_id=${currentUser.id}`);
                myTeachSkills = mySkills.filter(s => s.type === 'teach');
                loadSkills();
            } catch (err) { showToast(err.message, 'error'); }
        }

        async function deleteSkill(id) {
            if (!confirm('Delete this skill?')) return;
            try {
                await api.delete(`/skills/${id}`);
                showToast('Skill deleted', 'success');
                loadSkills();
            } catch (err) { showToast(err.message, 'error'); }
        }

        function openSwapModal(userId, skillId, skillName, userName) {
            if (!currentUser) return window.location.href = '/login.html';
            if (myTeachSkills.length === 0) return showToast('Add a skill you can teach first', 'warning');
            swapTarget = { userId, skillId, skillName, userName };
            document.getElementById('swapInfo').innerHTML = `Swap with <strong>${userName}</strong> for <strong>${skillName}</strong>`;
            document.getElementById('swapMySkill').innerHTML = myTeachSkills.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            document.getElementById('swapMessage').value = '';
            document.getElementById('swapModal').classList.add('active');
        }

        function closeSwapModal() { document.getElementById('swapModal').classList.remove('active'); }

        async function sendSwap() {
            const sender_skill_id = parseInt(document.getElementById('swapMySkill').value);
            const message = document.getElementById('swapMessage').value.trim();
            try {
                await api.post('/requests', {
                    receiver_id: swapTarget.userId,
                    sender_skill_id,
                    receiver_skill_id: swapTarget.skillId,
                    message
                });
                showToast('Swap request sent!', 'success');
                closeSwapModal();
            } catch (err) { showToast(err.message, 'error'); }
        }

        init();
    </script>
</body>

</html>
